# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: build Astro y despliega en GitHub Pages
# Se ejecuta automáticamente en cada push a la rama main.
# URL resultante: https://maxcastillomilla.github.io/MXCSML
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo manualmente desde la UI de GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez — cancela builds anteriores si llega uno nuevo
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
